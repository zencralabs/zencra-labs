version: 2

updates:
  # ── npm / Node.js dependencies ───────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    # Open PRs for minor + patch updates together; major updates separately
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

    # Don't open more than 5 PRs at once — keeps the queue manageable
    open-pull-requests-limit: 5

    # Auto-assign to the project maintainer
    assignees:
      - "jkn-devcraft"

    labels:
      - "dependencies"
      - "automated"

    # Ignore major version bumps on packages that require careful migration
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@supabase/supabase-js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "openai"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ───────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
