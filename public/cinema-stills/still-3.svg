<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0814"/>
      <stop offset="50%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#2a1848"/>
    </linearGradient>
    <linearGradient id="moon3" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F0E8FF"/>
      <stop offset="100%" stop-color="#C4A8FF"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="blur3b"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky3)"/>
  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="50" cy="50" r="0.6"/><circle cx="130" cy="35" r="0.8"/><circle cx="210" cy="65" r="0.5"/>
    <circle cx="310" cy="42" r="0.7"/><circle cx="400" cy="28" r="0.9"/><circle cx="490" cy="55" r="0.6"/>
    <circle cx="580" cy="38" r="0.7"/><circle cx="660" cy="65" r="0.5"/><circle cx="750" cy="45" r="0.8"/>
    <circle cx="85" cy="120" r="0.5"/><circle cx="175" cy="100" r="0.7"/><circle cx="265" cy="130" r="0.6"/>
    <circle cx="355" cy="90" r="0.8"/><circle cx="455" cy="115" r="0.5"/><circle cx="545" cy="95" r="0.7"/>
    <circle cx="635" cy="125" r="0.6"/><circle cx="725" cy="105" r="0.5"/>
  </g>
  <!-- Moon -->
  <circle cx="640" cy="90" r="45" fill="#A78BFA" opacity="0.15" filter="url(#blur3)"/>
  <circle cx="640" cy="90" r="28" fill="#DDD6FE" opacity="0.9"/>
  <circle cx="650" cy="82" r="20" fill="#0a0814" opacity="0.08"/>
  <!-- Mountain silhouettes — back layer -->
  <polygon points="0,320 80,200 160,290 240,170 320,260 400,140 480,250 560,165 640,240 720,160 800,230 800,450 0,450" fill="#120d24"/>
  <!-- Mountain silhouettes — mid layer -->
  <polygon points="0,360 60,280 140,330 220,250 300,310 380,220 460,295 540,240 620,290 700,220 780,270 800,260 800,450 0,450" fill="#0d0818"/>
  <!-- Mountain silhouettes — front layer -->
  <polygon points="0,400 50,360 120,380 200,340 280,375 360,335 440,365 520,330 600,360 680,330 760,360 800,345 800,450 0,450" fill="#080510"/>
  <!-- Moonlight glow on mountains -->
  <ellipse cx="640" cy="250" rx="200" ry="60" fill="#7C3AED" opacity="0.08" filter="url(#blur3)"/>
  <!-- Snow caps -->
  <g fill="rgba(220,210,255,0.5)">
    <polygon points="400,140 390,170 410,170"/>
    <polygon points="240,170 228,198 252,198"/>
    <polygon points="560,165 550,190 570,190"/>
    <polygon points="720,160 708,185 732,185"/>
  </g>
  <!-- Letterbox -->
  <rect width="800" height="38" fill="black"/>
  <rect y="412" width="800" height="38" fill="black"/>
  <text x="24" y="24" font-family="monospace" font-size="9" fill="rgba(167,139,250,0.6)" letter-spacing="3">HIGHLAND RIDGE · MOONRISE</text>
</svg>
