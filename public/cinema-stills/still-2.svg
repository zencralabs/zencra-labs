<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="60%" stop-color="#0d0025"/>
      <stop offset="100%" stop-color="#1a0035"/>
    </linearGradient>
    <linearGradient id="ground2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a30"/>
      <stop offset="100%" stop-color="#050010"/>
    </linearGradient>
    <filter id="blur2"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="blur2b"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <!-- Sky -->
  <rect width="800" height="450" fill="url(#sky2)"/>
  <!-- Ground / road -->
  <rect x="0" y="310" width="800" height="140" fill="url(#ground2)"/>
  <!-- Horizon neon glow -->
  <rect x="0" y="305" width="800" height="8" fill="#FF00FF" opacity="0.15" filter="url(#blur2)"/>
  <!-- City silhouette buildings -->
  <g fill="#0d001a">
    <rect x="0" y="200" width="40" height="110"/>
    <rect x="15" y="175" width="20" height="25"/>
    <rect x="50" y="220" width="30" height="90"/>
    <rect x="85" y="185" width="45" height="125"/>
    <rect x="100" y="160" width="15" height="25"/>
    <rect x="135" y="210" width="35" height="100"/>
    <rect x="175" y="190" width="55" height="120"/>
    <rect x="190" y="165" width="25" height="25"/>
    <rect x="240" y="225" width="30" height="85"/>
    <rect x="275" y="195" width="40" height="115"/>
    <rect x="285" y="170" width="20" height="25"/>
    <rect x="320" y="215" width="50" height="95"/>
    <rect x="375" y="175" width="60" height="135"/>
    <rect x="395" y="150" width="20" height="25"/>
    <rect x="445" y="205" width="35" height="105"/>
    <rect x="485" y="185" width="55" height="125"/>
    <rect x="500" y="160" width="25" height="25"/>
    <rect x="545" y="215" width="30" height="95"/>
    <rect x="580" y="195" width="50" height="115"/>
    <rect x="600" y="165" width="20" height="30"/>
    <rect x="635" y="200" width="40" height="110"/>
    <rect x="680" y="175" width="55" height="135"/>
    <rect x="695" y="150" width="25" height="25"/>
    <rect x="740" y="210" width="35" height="100"/>
    <rect x="780" y="190" width="40" height="120"/>
  </g>
  <!-- Neon window glows on buildings -->
  <g opacity="0.8">
    <rect x="88" y="195" width="4" height="3" fill="#00FFFF"/>
    <rect x="96" y="200" width="4" height="3" fill="#FF00FF"/>
    <rect x="105" y="188" width="4" height="3" fill="#00FFFF"/>
    <rect x="178" y="200" width="4" height="3" fill="#FF6600"/>
    <rect x="186" y="208" width="4" height="3" fill="#FF00FF"/>
    <rect x="195" y="195" width="4" height="3" fill="#00FFFF"/>
    <rect x="278" y="210" width="4" height="3" fill="#FF00FF"/>
    <rect x="288" y="198" width="4" height="3" fill="#00FFFF"/>
    <rect x="380" y="185" width="4" height="3" fill="#FF6600"/>
    <rect x="392" y="195" width="4" height="3" fill="#FF00FF"/>
    <rect x="402" y="178" width="4" height="3" fill="#00FFFF"/>
    <rect x="488" y="198" width="4" height="3" fill="#FF00FF"/>
    <rect x="500" y="188" width="4" height="3" fill="#FF6600"/>
    <rect x="583" y="208" width="4" height="3" fill="#00FFFF"/>
    <rect x="595" y="198" width="4" height="3" fill="#FF00FF"/>
    <rect x="683" y="185" width="4" height="3" fill="#FF6600"/>
    <rect x="695" y="195" width="4" height="3" fill="#00FFFF"/>
    <rect x="705" y="178" width="4" height="3" fill="#FF00FF"/>
  </g>
  <!-- Road with center neon line -->
  <rect x="370" y="310" width="60" height="140" fill="#FF00FF" opacity="0.06"/>
  <line x1="400" y1="320" x2="360" y2="450" stroke="#FF00FF" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="320" x2="440" y2="450" stroke="#FF00FF" stroke-width="2" opacity="0.5"/>
  <!-- Side neon reflections on ground -->
  <rect x="0" y="315" width="800" height="80" fill="#3D0080" opacity="0.12" filter="url(#blur2)"/>
  <ellipse cx="400" cy="340" rx="300" ry="20" fill="#FF00FF" opacity="0.08" filter="url(#blur2)"/>
  <!-- Rain streaks -->
  <g stroke="rgba(180,220,255,0.25)" stroke-width="0.5">
    <line x1="60" y1="0" x2="45" y2="310"/>
    <line x1="140" y1="0" x2="125" y2="310"/>
    <line x1="230" y1="0" x2="215" y2="310"/>
    <line x1="320" y1="0" x2="305" y2="310"/>
    <line x1="420" y1="0" x2="405" y2="310"/>
    <line x1="520" y1="0" x2="505" y2="310"/>
    <line x1="620" y1="0" x2="605" y2="310"/>
    <line x1="720" y1="0" x2="705" y2="310"/>
  </g>
  <!-- Letterbox -->
  <rect width="800" height="38" fill="black"/>
  <rect y="412" width="800" height="38" fill="black"/>
  <text x="24" y="24" font-family="monospace" font-size="9" fill="rgba(255,0,255,0.6)" letter-spacing="3">NEON CITY · MIDNIGHT</text>
</svg>
