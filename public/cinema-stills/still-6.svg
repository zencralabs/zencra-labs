<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <radialGradient id="beam6" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#D0D8E8" stop-opacity="0.22"/>
      <stop offset="35%" stop-color="#7090B8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#010305" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core6" cx="50%" cy="0%" r="20%">
      <stop offset="0%" stop-color="#E8F0FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur6a"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blur6b"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="blur6c"><feGaussianBlur stdDeviation="1"/></filter>
  </defs>
  <!-- Deep black base -->
  <rect width="800" height="450" fill="#010305"/>
  <!-- Projector fan glow -->
  <rect width="800" height="450" fill="url(#beam6)"/>
  <!-- Projector beams — fan of light rays from upper center -->
  <g opacity="0.12">
    <polygon points="400,0 310,450 320,450" fill="#C8D8F0"/>
    <polygon points="400,0 270,450 285,450" fill="#B0C4E0" opacity="0.8"/>
    <polygon points="400,0 240,450 255,450" fill="#98B0D0" opacity="0.6"/>
    <polygon points="400,0 215,450 228,450" fill="#80A0C0" opacity="0.4"/>
    <polygon points="400,0 490,450 480,450" fill="#C8D8F0"/>
    <polygon points="400,0 530,450 515,450" fill="#B0C4E0" opacity="0.8"/>
    <polygon points="400,0 560,450 545,450" fill="#98B0D0" opacity="0.6"/>
    <polygon points="400,0 585,450 572,450" fill="#80A0C0" opacity="0.4"/>
    <polygon points="400,0 355,450 362,450" fill="#D0E0F8" opacity="0.9"/>
    <polygon points="400,0 445,450 438,450" fill="#D0E0F8" opacity="0.9"/>
    <polygon points="400,0 395,450 405,450" fill="#E0EAFF" opacity="1"/>
  </g>
  <!-- Beam core — bright center -->
  <ellipse cx="400" cy="0" rx="60" ry="30" fill="#D8E8FF" opacity="0.25" filter="url(#blur6a)"/>
  <ellipse cx="400" cy="0" rx="20" ry="10" fill="#F0F6FF" opacity="0.8" filter="url(#blur6b)"/>
  <!-- Subtle horizontal scan lines — very faint -->
  <g stroke="rgba(160,180,220,0.05)" stroke-width="1">
    <line x1="0" y1="80"  x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>
  <!-- Dust particles in beam -->
  <g fill="rgba(200,220,255,0.35)" filter="url(#blur6c)">
    <circle cx="390" cy="90"  r="1.2"/>
    <circle cx="405" cy="140" r="0.9"/>
    <circle cx="382" cy="200" r="1.1"/>
    <circle cx="418" cy="170" r="0.8"/>
    <circle cx="370" cy="250" r="1.0"/>
    <circle cx="430" cy="310" r="0.9"/>
    <circle cx="356" cy="330" r="0.8"/>
    <circle cx="446" cy="280" r="1.0"/>
    <circle cx="362" cy="120" r="0.7"/>
    <circle cx="440" cy="95"  r="0.9"/>
  </g>
  <!-- Vignette corners -->
  <radialGradient id="vig6" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#010305" stop-opacity="0.9"/>
  </radialGradient>
  <rect width="800" height="450" fill="url(#vig6)"/>
  <!-- Letterbox bars -->
  <rect width="800" height="38" fill="black"/>
  <rect y="412" width="800" height="38" fill="black"/>
  <text x="24" y="24" font-family="monospace" font-size="9" fill="rgba(180,200,230,0.55)" letter-spacing="3">FINAL RENDER · OUTPUT</text>
</svg>
